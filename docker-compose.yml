# Total-LLM 통합 Docker Compose
#
# 서비스 포트:
#   - Frontend: 9004 (Nginx)
#   - Backend: 9002 (FastAPI)
#   - Qdrant: 6333 (HTTP), 6334 (gRPC)
#   - Redis: 6379
#   - vLLM: 9000

services:
  # =============================================================================
  # Frontend - React UI
  # =============================================================================
  frontend:
    build:
      context: ./frontend/react-ui
      dockerfile: Dockerfile
    container_name: total-llm-frontend
    ports:
      - "9004:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_BACKEND_URL=http://backend:9002
    restart: unless-stopped
    mem_limit: ${FRONTEND_MEM_LIMIT:-512m}
    cpus: ${FRONTEND_CPUS:-0.50}
    networks:
      - total-llm-network
    labels:
      - org.opencontainers.image.title=total-llm-frontend
      - org.opencontainers.image.vendor=total-llm
      - com.total-llm.service=frontend
      - com.total-llm.tier=web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # =============================================================================
  # Backend - FastAPI
  # =============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: total-llm-backend
    ports:
      - "9002:9002"
    depends_on:
      vllm:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      # LLM/VLM Configuration (unified Qwen3.5 endpoint)
      - VLLM_BASE_URL=http://vllm:9000/v1
      - LLM_MODEL_NAME=Qwen/Qwen3.5-27B-Instruct-GPTQ-Int4
      - VLLM_MODEL_NAME=Qwen/Qwen3.5-27B-Instruct-GPTQ-Int4
      - VLM_BASE_URL=http://vllm:9000/v1
      - VLM_MODEL_NAME=Qwen/Qwen3.5-27B-Instruct-GPTQ-Int4
      - LLM_TEMPERATURE=0.7
      - LLM_MAX_TOKENS=4096
      # Embedding
      - EMBEDDING_MODEL=BAAI/bge-small-en-v1.5
      # Vector DB
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=documents
      # Redis (Optional)
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:9004}
      - DATA_PATH=${DATA_PATH:-/app/data}
      - UPLOAD_PATH=${UPLOAD_PATH:-/app/data/uploads}
      - LOG_PATH=${LOG_PATH:-/app/logs}
      - ALARM_IMAGES_PATH=${ALARM_IMAGES_PATH:-/app/data/alarms}
      - REPORT_PATH=${REPORT_PATH:-/app/data/reports}
      # Vision Model (optional split deployment can override VLM_BASE_URL/VLM_MODEL_NAME)
      - VISION_MODEL_ID=Qwen/Qwen3.5-27B-Instruct-GPTQ-Int4
      - VISION_SIMULATION_MODE=true
    volumes:
      - ${BACKEND_CONFIG_PATH:-./backend/config}:/app/config:ro
      - ${UPLOADS_HOST_PATH:-./data/uploads}:/app/data/uploads
      - ${LOGS_HOST_PATH:-./data/logs}:/app/logs
      - ${ALARMS_HOST_PATH:-./data/alarms}:/app/data/alarms
      - ${REPORTS_HOST_PATH:-./data/reports}:/app/data/reports
      - /var/run/docker.sock:/var/run/docker.sock  # Docker 소켓 마운트 (서버 제어용)
    restart: unless-stopped
    mem_limit: ${BACKEND_MEM_LIMIT:-4g}
    cpus: ${BACKEND_CPUS:-2.00}
    networks:
      - total-llm-network
    labels:
      - org.opencontainers.image.title=total-llm-backend
      - org.opencontainers.image.vendor=total-llm
      - com.total-llm.service=backend
      - com.total-llm.tier=api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # =============================================================================
  # vLLM - Unified Qwen3.5 Model Server
  # =============================================================================
  vllm:
    image: vllm/vllm-openai:latest
    container_name: total-llm-vllm
    command: >
      --model Qwen/Qwen3.5-27B-Instruct-GPTQ-Int4
      --served-model-name Qwen/Qwen3.5-27B-Instruct-GPTQ-Int4
      --host 0.0.0.0
      --port 9000
      --max-model-len 32768
      --gpu-memory-utilization 0.85
      --quantization gptq
      --dtype float16
      --trust-remote-code
      --enable-auto-tool-choice
      --tool-call-parser hermes
      --limit-mm-per-prompt image=4
      --chat-template-content-format openai
      --reasoning-parser qwen3
    ports:
      - "9000:9000"
    restart: unless-stopped
    networks:
      - total-llm-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/v1/models', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # =============================================================================
  # Qdrant Vector Database
  # =============================================================================
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: total-llm-qdrant
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    volumes:
      - ${QDRANT_STORAGE_HOST_PATH:-./data/qdrant_storage}:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__TELEMETRY_DISABLED=true
    restart: unless-stopped
    mem_limit: ${QDRANT_MEM_LIMIT:-2g}
    cpus: ${QDRANT_CPUS:-1.00}
    networks:
      - total-llm-network
    labels:
      - org.opencontainers.image.title=total-llm-qdrant
      - org.opencontainers.image.vendor=total-llm
      - com.total-llm.service=qdrant
      - com.total-llm.tier=datastore
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # =============================================================================
  # Redis Cache
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: total-llm-redis
    ports:
      - "6379:6379"
    volumes:
      - ${REDIS_DATA_HOST_PATH:-./data/redis_data}:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    mem_limit: ${REDIS_MEM_LIMIT:-1g}
    cpus: ${REDIS_CPUS:-0.50}
    networks:
      - total-llm-network
    labels:
      - org.opencontainers.image.title=total-llm-redis
      - org.opencontainers.image.vendor=total-llm
      - com.total-llm.service=redis
      - com.total-llm.tier=cache
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # =============================================================================
  # PostgreSQL (Optional - for structured data)
  # =============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: total-llm-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-total_llm}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-total_llm}
    volumes:
      - ${POSTGRES_DATA_HOST_PATH:-./data/postgres_data}:/var/lib/postgresql/data
    restart: unless-stopped
    mem_limit: ${POSTGRES_MEM_LIMIT:-2g}
    cpus: ${POSTGRES_CPUS:-1.00}
    networks:
      - total-llm-network
    labels:
      - org.opencontainers.image.title=total-llm-postgres
      - org.opencontainers.image.vendor=total-llm
      - com.total-llm.service=postgres
      - com.total-llm.tier=database
    profiles:
      - with-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-total_llm} -d ${POSTGRES_DB:-total_llm}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  total-llm-network:
    driver: bridge
    name: total-llm-network

# =============================================================================
# Usage
# =============================================================================
# 기본 실행 (Frontend, Backend, Qdrant, Redis):
#   docker-compose up -d
#
# PostgreSQL 포함 실행:
#   docker-compose --profile with-postgres up -d
#
# 빌드 및 실행:
#   docker-compose up -d --build
#
# 로그 확인:
#   docker-compose logs -f
#
# 중지:
#   docker-compose down
#
# 볼륨 포함 삭제:
#   docker-compose down -v
#
# 참고: GPU 환경에서는 docker compose 대신 scripts도 사용 가능
#   ./services/vllm/run_qwen3.5_27b.sh
