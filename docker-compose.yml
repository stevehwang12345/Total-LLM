# Total-LLM Docker Compose
#
# Services:
#   - vLLM: 9000 (Qwen3.5-9B, GPU 1, FP8)
#   - Backend: 9002 (FastAPI)
#   - Qdrant: 6333/6334
#   - Redis: 6381
#   - PostgreSQL: 5434

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: total-llm-vllm
    command:
      - "--model"
      - "Qwen/Qwen3.5-9B"
      - "--served-model-name"
      - "Qwen/Qwen3.5-9B"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "9000"
      - "--max-model-len"
      - "4096"
      - "--gpu-memory-utilization"
      - "0.90"
      - "--quantization"
      - "fp8"
      - "--dtype"
      - "auto"
      - "--trust-remote-code"
      - "--enforce-eager"
      - "--limit-mm-per-prompt"
      - '{"image": 2}'
    ports:
      - "9000:9000"
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - HF_HOME=/root/.cache/huggingface
    restart: unless-stopped
    ipc: host
    networks:
      - total-llm-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/v1/models', timeout=5)\""]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 180s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: total-llm-backend
    ports:
      - "9002:9002"
    depends_on:
      vllm:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - VLLM_BASE_URL=http://vllm:9000/v1
      - LLM_MODEL_NAME=Qwen/Qwen3.5-9B
      - VLLM_MODEL_NAME=Qwen/Qwen3.5-9B
      - VLM_BASE_URL=http://vllm:9000/v1
      - VLM_MODEL_NAME=Qwen/Qwen3.5-9B
      - VLLM_TEMPERATURE=0.7
      - VLLM_MAX_TOKENS=4096
      - EMBEDDING_MODEL=dragonkue/bge-m3-ko
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION=documents
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:9004,http://localhost:3000}
      - DATA_PATH=/app/data
      - UPLOAD_PATH=/app/data/uploads
      - LOG_PATH=/app/logs
      - ALARM_IMAGES_PATH=/app/data/alarms
      - REPORT_PATH=/app/data/reports
      - VLM_SIMULATION_MODE=false
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-total_llm}
      - POSTGRES_USER=${POSTGRES_USER:-total_llm}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-total_llm_dev}
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/logs:/app/logs
      - ./data/alarms:/app/data/alarms
      - ./data/reports:/app/data/reports
      - ./data/documents:/app/data/documents
    restart: unless-stopped
    mem_limit: 4g
    cpus: 2.0
    networks:
      - total-llm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: total-llm-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__TELEMETRY_DISABLED=true
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1.0
    networks:
      - total-llm-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: total-llm-redis
    ports:
      - "6381:6379"
    volumes:
      - ./data/redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    networks:
      - total-llm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  postgres:
    image: postgres:15-alpine
    container_name: total-llm-postgres
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-total_llm}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-total_llm_dev}
      - POSTGRES_DB=${POSTGRES_DB:-total_llm}
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1.0
    networks:
      - total-llm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-total_llm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  total-llm-network:
    driver: bridge
    name: total-llm-network
