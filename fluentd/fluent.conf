# Fluentd Configuration for Security Monitoring System
# 보안 관제 시스템 로그 수집 파이프라인

# ============================================
# Input Sources
# ============================================

# 1. 보안 장비 로그 (Syslog)
<source>
  @type syslog
  port 5140
  bind 0.0.0.0
  tag security_device
  <parse>
    @type syslog
  </parse>
</source>

# 2. 출입 통제 시스템 로그 (HTTP)
<source>
  @type http
  port 8888
  bind 0.0.0.0
  tag access_control
  <parse>
    @type json
  </parse>
</source>

# 3. 방화벽 로그 (파일)
<source>
  @type tail
  path /var/log/firewall/*.log
  pos_file /var/log/td-agent/firewall.pos
  tag network_firewall
  <parse>
    @type regexp
    expression /^(?<timestamp>\S+ \S+) (?<host>\S+) (?<ident>\S+) (?<message>.*)$/
    time_key timestamp
    time_format %b %d %H:%M:%S
  </parse>
</source>

# 4. 애플리케이션 로그 (Docker 컨테이너)
<source>
  @type forward
  port 24224
  bind 0.0.0.0
  tag application
</source>

# 5. 시스템 로그 (journald)
<source>
  @type systemd
  path /var/log/journal
  tag system
  <storage>
    @type local
    persistent true
    path /var/log/td-agent/systemd.pos
  </storage>
  <entry>
    field_map {"MESSAGE": "message", "_HOSTNAME": "host", "PRIORITY": "level"}
    field_map_strict false
  </entry>
</source>

# ============================================
# Filters (로그 파싱 및 정규화)
# ============================================

# 보안 장비 로그 파싱
<filter security_device.**>
  @type record_transformer
  <record>
    source_type "security_device"
    timestamp ${time}
    level ${record["severity"] || "INFO"}
  </record>
</filter>

# 출입 통제 로그 정규화
<filter access_control.**>
  @type record_transformer
  <record>
    source_type "access_control"
    timestamp ${time}
    level "INFO"
  </record>
</filter>

# 방화벽 로그 정규화
<filter network_firewall.**>
  @type record_transformer
  <record>
    source_type "network_firewall"
    timestamp ${time}
    level "WARNING"
  </record>
</filter>

# 애플리케이션 로그 정규화
<filter application.**>
  @type record_transformer
  <record>
    source_type "application"
    timestamp ${time}
  </record>
</filter>

# 시스템 로그 정규화
<filter system.**>
  @type record_transformer
  <record>
    source_type "system"
    timestamp ${time}
  </record>
</filter>

# ============================================
# Output to vLLM Backend (HTTP)
# ============================================

<match **>
  @type http
  endpoint http://localhost:9002/api/logs/ingest
  http_method post
  json_array true

  <format>
    @type json
  </format>

  <buffer>
    @type file
    path /var/log/td-agent/buffer/vllm
    flush_mode interval
    flush_interval 5s
    chunk_limit_size 5M
    total_limit_size 1G
    overflow_action drop_oldest_chunk
    retry_type exponential_backoff
    retry_wait 1s
    retry_max_interval 60s
    retry_timeout 1h
  </buffer>

  # 에러 시 로컬 파일에 백업
  <secondary>
    @type file
    path /var/log/td-agent/failed/vllm
    compress gzip
  </secondary>
</match>

# ============================================
# Monitoring & Metrics
# ============================================

# Prometheus exporter
<source>
  @type prometheus
  bind 0.0.0.0
  port 24231
  metrics_path /metrics
</source>

# Fluentd 자체 로그
<label @FLUENT_LOG>
  <match fluent.**>
    @type file
    path /var/log/td-agent/fluent.log
    compress gzip
    <buffer>
      timekey 1d
      timekey_wait 10m
      timekey_use_utc true
    </buffer>
  </match>
</label>
